name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make generate

      - name: Build release
        run: make package

      - name: Find artifact
        id: artifact
        run: |
          BUILD_DIR=$(xcodebuild -project Clipped/Clipped.xcodeproj -scheme Clipped -configuration Release -showBuildSettings 2>/dev/null | grep -m1 'BUILT_PRODUCTS_DIR' | awk '{print $NF}')
          echo "zip_path=${BUILD_DIR}/Clipped.zip" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "${BUILD_DIR}/Clipped.zip" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.zip_path }}
          body: |
            ## Clipped ${{ github.ref_name }}

            **Install via Homebrew:**
            ```
            brew install mcclowes/clipped/clipped
            ```

            **SHA256:** `${{ steps.artifact.outputs.sha256 }}`
          draft: false
          prerelease: false

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          CASK_CONTENT=$(cat <<CASKEOF
          cask "clipped" do
            version "${{ github.ref_name }}"
            sha256 "${{ steps.artifact.outputs.sha256 }}"
            url "https://github.com/mcclowes/clipped/releases/download/${{ github.ref_name }}/Clipped.zip"
            name "Clipped"
            desc "Native macOS clipboard manager"
            homepage "https://github.com/mcclowes/clipped"

            app "Clipped.app"

            zap trash: [
              "~/Library/Application Support/Clipped",
              "~/Library/Preferences/com.mcclowes.Clipped.plist",
            ]
          end
          CASKEOF
          )

          # Get current file SHA for the update API call
          FILE_SHA=$(gh api repos/mcclowes/homebrew-clipped/contents/Casks/clipped.rb -q .sha 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/mcclowes/homebrew-clipped/contents/Casks/clipped.rb \
              -X PUT \
              -f message="Update clipped to ${{ github.ref_name }}" \
              -f content="$(echo "$CASK_CONTENT" | base64)" \
              -f sha="$FILE_SHA"
          else
            gh api repos/mcclowes/homebrew-clipped/contents/Casks/clipped.rb \
              -X PUT \
              -f message="Add clipped ${{ github.ref_name }}" \
              -f content="$(echo "$CASK_CONTENT" | base64)"
          fi
