name: Clipped
options:
  bundleIdPrefix: com.mcclowes
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Clipped:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.clipped
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Clipped.entitlements
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Resources/Clipped.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true

  ClippedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Clipped
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.clipped.tests
        GENERATE_INFOPLIST_FILE: true
